apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-proxy-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: proxy
  template:
    metadata:
      labels:
        app: proxy
    spec:
      containers:
      - name: python-proxy
        # Miejsce na obraz zostanie dynamicznie nadpisane przez GitHub Actions podczas wdrożenia
        image: REPLACE_ME_LATER
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: proxy-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: proxy